name: Build OTP Graph

on:
  schedule:
    - cron: '0 3 * * 0'  # SOLO 1 vez por semana
  workflow_dispatch:
  push:
    paths:
      - 'graph-source/**'
      - '.github/workflows/build-graph.yml'

jobs:
  build-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OTP_URL: "https://repo1.maven.org/maven2/org/opentripplanner/otp/2.6.0/otp-2.6.0-shaded.jar"
      JAVA_OPTS: "-Xmx6G -XX:+UseG1GC"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download OTP jar
        run: |
          curl -L "$OTP_URL" -o otp.jar

      - name: Prepare directories
        run: |
          mkdir -p graph-source graph

      # 🔥 CAMBIO IMPORTANTE: CACHE DE GTFS/OSM
      - name: Restore cached graph sources
        uses: actions/cache@v4
        with:
          path: graph-source
          key: gtfs-osm-cache-v1

      - name: Download data ONLY if missing
        run: |
          cd graph-source

          if [ ! -f "1267.zip" ]; then
            echo "⬇️ Descargando GTFS..."
            curl -L "https://nap.transportes.gob.es/api/Fichero/download/1267" -o 1267.zip
            curl -L "https://nap.transportes.gob.es/api/Fichero/download/1262" -o 1262.zip
            curl -L "https://nap.transportes.gob.es/api/Fichero/download/1130" -o 1130.zip
          fi

          if [ ! -f "basque-country-latest.osm.pbf" ]; then
            curl -L "https://download.geofabrik.de/europe/spain/pais-vasco-latest.osm.pbf" -o euskalherria.osm.pbf
          fi

      - name: Build OTP graph
        run: |
          set -e
          java $JAVA_OPTS -jar otp.jar --build --save graph-source

      - name: Move graph
        run: |
          mv graph-source/graph.obj graph/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-graph
          path: graph

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 89.167.73.244 >> ~/.ssh/known_hosts

      - name: Deploy graph only
        run: |
          ssh root@89.167.73.244 "mkdir -p /opt/bizkaifest/graph"
          scp graph/graph.obj root@89.167.73.244:/opt/bizkaifest/graph/

      - name: Restart OTP safely
        run: |
          ssh root@89.167.73.244 "systemctl restart otp"
