name: Build OTP Graph

on:
  workflow_dispatch:
  push:
    paths:
      - 'graph-source/sources.txt'
      - '.github/workflows/build-graph.yml'

jobs:
  build-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      OTP_VERSION: '2.5.0'
      OTP_URL: 'https://repo1.maven.org/maven2/org/opentripplanner/otp/2.5.0/otp-2.5.0-shaded.jar'
      JAVA_OPTS: '-Xmx6G -XX:+UseG1GC'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache OTP jar
        id: cache-otp
        uses: actions/cache@v4
        with:
          path: otp.jar
          key: otp-jar-v2.5.0

      - name: Download OTP jar if needed
        if: steps.cache-otp.outputs.cache-hit != 'true'
        run: |
          curl -fsSL "$OTP_URL" -o otp.jar
          ls -lh otp.jar

      - name: Prepare graph-source directory
        run: mkdir -p graph-source

      - name: Download graph data (simple, segura)
        run: |
          set -e
          sources_file="graph-source/sources.txt"
          if [ ! -f "$sources_file" ]; then
            echo "❌ ERROR: Debes crear $sources_file con una URL válida por línea."
            exit 1
          fi
          cd graph-source
          while read -r line; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^# ]] && continue
            url="$line"
            fname=$(basename "${url%%\?*}")
            echo "⬇️  Descargando $fname desde $url"
            curl -fSL "$url" -o "$fname"
            if [ ! -s "$fname" ]; then
              echo "❌ Error: archivo $fname vacío o fallo de descarga"
              exit 1
            fi
          done < sources.txt
          echo "✅ Datos descargados:"
          ls -lh

      - name: Prepare output dir
        run: mkdir -p graph

      - name: Build OTP Graph
        run: |
          set -e
          echo "Iniciando construcción de grafo OTP..."
          java $JAVA_OPTS -jar otp.jar --build graph-source --save graph
          echo "Build terminado"
          if ! [ -d "graph" ] || ! ls graph/* > /dev/null 2>&1; then
            echo "❌ ERROR: El directorio graph está vacío, fallo de construcción"
            exit 1
          fi

      - name: List result directory
        run: ls -lh graph

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-graph
          path: graph
          retention-days: 30
