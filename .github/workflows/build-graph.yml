name: Build OTP Graph

on:
  workflow_dispatch:
  push:
    paths:
      - 'graph-source/**'
      - '.github/workflows/build-graph.yml'

jobs:
  build-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OTP_URL: "https://repo1.maven.org/maven2/org/opentripplanner/otp/2.5.0/otp-2.5.0-shaded.jar"
      JAVA_OPTS: "-Xmx6G -XX:+UseG1GC"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download OTP jar
        run: |
          curl -L "$OTP_URL" -o otp.jar
          ls -lh otp.jar

      - name: Prepare directories
        run: |
          mkdir -p graph-source
          mkdir -p graph

      - name: Download GTFS + OSM data
        run: |
          set -e
          cd graph-source

          while read -r line; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^# ]] && continue

            if [[ "$line" == HEADER:apikey=*'|'* ]]; then
              api_key="${line#HEADER:apikey=}"
              api_key="${api_key%%|*}"
              url="${line##*|}"
              file="$(basename "${url%%\?*}").zip"

              echo "⬇️ Descargando (API KEY) $file"
              curl -L -H "apikey: $api_key" "$url" -o "$file"
            else
              url="$line"
              file="$(basename "${url%%\?*}")"

              echo "⬇️ Descargando $file"
              curl -L "$url" -o "$file"
            fi

            ls -lh "$file"
          done < sources.txt

      - name: Build OTP graph
        run: |
          set -e
          echo "🚀 Construyendo grafo OTP..."

          ls -lah graph-source

          java $JAVA_OPTS -jar otp.jar --build graph-source --save graph
      - name: Verify graph
        run: |
          echo "📦 Verificando graph..."
          ls -lah graph

          if [ ! -d "graph" ] || [ -z "$(ls -A graph)" ]; then
            echo "❌ ERROR: graph vacío"
            exit 1
          fi

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-graph
          path: graph
          retention-days: 30
