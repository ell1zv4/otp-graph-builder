name: Build OTP Graph

on:
  workflow_dispatch:
  push:
    paths:
      - 'graph-source/**'

jobs:
  build-graph:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download OTP jar
        run: |
          curl -L -o otp.jar https://repo1.maven.org/maven2/org/opentripplanner/otp/2.5.0/otp-2.5.0-shaded.jar

      - name: Show memory
        run: free -h

      - name: Build OTP graph
        run: |
          java -Xmx6G -XX:+UseG1GC -jar otp.jar \
            --build graph-source \
            --save graph

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-graph
          path: graph
