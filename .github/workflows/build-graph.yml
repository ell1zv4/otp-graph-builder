name: Build OTP Graph

on:
  workflow_dispatch:
  push:
    paths:
      - 'graph-source/**'
      - '.github/workflows/build-graph.yml'

jobs:
  build-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      OTP_VERSION: '2.5.0'
      OTP_URL: 'https://repo1.maven.org/maven2/org/opentripplanner/otp/2.5.0/otp-2.5.0-shaded.jar'
      JAVA_OPTS: '-Xmx6G -XX:+UseG1GC'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache OTP jar
        id: otp-cache
        uses: actions/cache@v4
        with:
          path: otp.jar
          key: otp-jar-v2.5.0

      - name: Download OTP jar if needed
        if: steps.otp-cache.outputs.cache-hit != 'true'
        run: |
          curl -fSL "${OTP_URL}" -o otp.jar
          ls -lh otp.jar

      - name: Print dir structure before build
        run: ls -lR

      - name: Build OTP Graph
        run: |
          set -e
          echo "Iniciando construcción de grafo en $(pwd)"
          java $JAVA_OPTS -jar otp.jar --build graph-source --save graph
          echo "Build terminado"
          if ! [ -d "graph" ] || ! ls graph/* > /dev/null 2>&1; then
            echo "Error: el directorio graph está vacío, fallo de construcción"
            exit 1
          fi

      - name: Print dir structure after build
        run: ls -lR

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-graph
          path: graph
          retention-days: 30
