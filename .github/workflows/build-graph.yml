name: Build OTP Graph

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'graph-source/**'
      - '.github/workflows/build-graph.yml'

jobs:
  build-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OTP_URL: "https://repo1.maven.org/maven2/org/opentripplanner/otp/2.6.0/otp-2.6.0-shaded.jar"
      JAVA_OPTS: "-Xmx6G -XX:+UseG1GC"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download OTP jar
        run: |
          curl -L "$OTP_URL" -o otp.jar
          ls -lh otp.jar

      - name: Prepare directories
        run: |
          mkdir -p graph-source
          mkdir -p graph

      - name: Download GTFS + OSM
        env:
          API_KEY: ${{ secrets.NAP_API_KEY }}
        run: |
          set -e
          cd graph-source

          download() {
            url=$1
            output=$2
            echo "⬇️ $output"
            tmp=$(mktemp)

            curl -L -H "apikey: $API_KEY" "$url" -o "$tmp"

            if file "$tmp" | grep -q "Zip archive"; then
              mv "$tmp" "$output"
            else
              echo "❌ $output no es ZIP válido"
              exit 1
            fi
          }

          download "https://nap.transportes.gob.es/api/Fichero/download/1130" "1130.zip"
          download "https://nap.transportes.gob.es/api/Fichero/download/1262" "1262.zip"
          download "https://nap.transportes.gob.es/api/Fichero/download/1267" "1267.zip"
          download "https://nap.transportes.gob.es/api/Fichero/download/1460" "1460.zip"
          download "https://nap.transportes.gob.es/api/Fichero/download/1264" "1264.zip"
          download "https://nap.transportes.gob.es/api/Fichero/download/1133" "1133.zip"

          curl -L "https://download.geofabrik.de/europe/spain/pais-vasco-latest.osm.pbf" -o "pais-vasco-latest.osm.pbf"

          ls -lah

      - name: Fix GTFS (remove block_id safely)
        run: |
          cd graph-source

          for f in *.zip; do
            echo "🔧 Fixing $f"

            mkdir tmp_gtfs
            unzip -q "$f" -d tmp_gtfs

            if [ -f tmp_gtfs/trips.txt ]; then
              awk -F, 'BEGIN{OFS=","}
              NR==1{
                for(i=1;i<=NF;i++) if($i=="block_id") col=i
              }
              {
                if(col) $col=""
                print
              }' tmp_gtfs/trips.txt > tmp_gtfs/trips_fixed.txt

              mv tmp_gtfs/trips_fixed.txt tmp_gtfs/trips.txt
            fi

            cd tmp_gtfs
            zip -qr "../$f" .
            cd ..

            rm -rf tmp_gtfs
          done

      - name: Build OTP graph
        run: |
          set -e
          echo "🚀 Building OTP graph..."
          ls -lah graph-source

          java $JAVA_OPTS -jar otp.jar \
            --build graph-source \
            --save graph

      - name: Verify graph output
        run: |
          ls -lah graph
          test -f graph/graph.obj || (echo "❌ graph.obj not found" && exit 1)

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-graph
          path: graph
          retention-days: 30

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 89.167.73.244 >> ~/.ssh/known_hosts

      - name: Upload graph to VPS
        run: |
          ssh root@89.167.73.244 "mkdir -p /opt/bizkaifest/graph"

          scp graph/graph.obj root@89.167.73.244:/opt/bizkaifest/graph/graph.obj

      - name: Upload router config (IMPORTANT FIX)
        run: |
          scp graph-source/router-config.json root@89.167.73.244:/opt/bizkaifest/graph/router-config.json

      - name: Restart OTP server
        run: |
          ssh root@89.167.73.244 "systemctl restart otp"
