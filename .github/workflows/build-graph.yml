name: Build OTP Graph

on:
  workflow_dispatch:
  push:
    paths:
      - 'graph-source/**'
      - '.github/workflows/build-graph.yml'

jobs:
  build-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OTP_URL: "https://repo1.maven.org/maven2/org/opentripplanner/otp/2.5.0/otp-2.5.0-shaded.jar"
      JAVA_OPTS: "-Xmx6G -XX:+UseG1GC"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download OTP jar
        run: |
          curl -L "$OTP_URL" -o otp.jar
          ls -lh otp.jar

      - name: Prepare directories
        run: |
          mkdir -p graph-source
          mkdir -p graph

      - name: Download GTFS + OSM data
        run: |
          set -e
          cd graph-source

          while read -r line; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^# ]] && continue

            if [[ "$line" == HEADER:apikey=*'|'* ]]; then
              api_key="${line#HEADER:apikey=}"
              api_key="${api_key%%|*}"
              url="${line##*|}"
              file="$(basename "${url%%\?*}").zip"

              echo "⬇️ Descargando (API KEY) $file"
              curl -L -H "apikey: $api_key" "$url" -o "$file"
            else
              url="$line"
              file="$(basename "${url%%\?*}")"

              echo "⬇️ Descargando $file"
              curl -L "$url" -o "$file"
            fi

            ls -lh "$file"
          done < sources.txt

      - name: Build OTP graph
        run: |
          set -e
          echo "🚀 Construyendo grafo OTP..."

          ls -lah graph-source

          # 🔥 COMANDO CORRECTO OTP 2.x
          java $JAVA_OPTS -jar otp.jar --build --save graph-source

      - name: Move generated graph
        run: |
          set -e
          echo "📦 Moviendo graph..."

          if [ -f "graph-source/graph.obj" ]; then
            mv graph-source/graph.obj graph/
          else
            echo "❌ ERROR: OTP no generó graph.obj"
            exit 1
          fi

          ls -lah graph

      - name: Verify graph
        run: |
          echo "📦 Verificando graph..."

          if [ ! -f "graph/graph.obj" ]; then
            echo "❌ ERROR: graph.obj no existe"
            exit 1
          fi

          echo "✅ Graph OK"
          ls -lh graph

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-graph
          path: graph
          retention-days: 30

      - name: Upload graph to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -L https://fly.io/install.sh | sh
          export PATH="$HOME/.fly/bin:$PATH"
      
          flyctl auth login --access-token "$FLY_API_TOKEN"
      
          echo "📤 Subiendo graph.obj a Fly..."
      
          flyctl ssh console -a otp-fiesta-bizkaifest -C "mkdir -p /data"
      
          flyctl ssh console -a otp-fiesta-bizkaifest -C "rm -f /data/graph.obj"
      
          flyctl ssh console -a otp-fiesta-bizkaifest -C "exit"
      
          flyctl ssh sftp put graph/graph.obj /data/graph.obj -a otp-fiesta-bizkaifest
