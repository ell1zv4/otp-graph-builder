name: Build OTP Graph

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    paths:
      - 'graph-source/**'
      - '.github/workflows/build-graph.yml'

jobs:
  build-graph:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      OTP_URL: "https://repo1.maven.org/maven2/org/opentripplanner/otp/2.6.0/otp-2.6.0-shaded.jar"
      JAVA_OPTS: "-Xmx6G -XX:+UseG1GC"

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download OTP jar
        run: |
          curl -L "$OTP_URL" -o otp.jar
          ls -lh otp.jar

      - name: Prepare directories
        run: |
          mkdir -p graph-source
          mkdir -p graph

      - name: Download GTFS + OSM data
        run: |
          set -e
          cd graph-source

          while read -r line; do
            [[ -z "$line" ]] && continue
            [[ "$line" =~ ^# ]] && continue

            if [[ "$line" == HEADER:apikey=*'|'* ]]; then
              api_key="${line#HEADER:apikey=}"
              api_key="${api_key%%|*}"
              url="${line##*|}"
              file="$(basename "${url%%\?*}").zip"
              curl -L -H "apikey: $api_key" "$url" -o "$file"
            else
              url="$line"
              file="$(basename "${url%%\?*}")"
              curl -L "$url" -o "$file"
            fi
          done < sources.txt

      - name: Build OTP graph
        run: |
          set -e
          echo "🚀 Construyendo grafo OTP..."
          java $JAVA_OPTS -jar otp.jar --build graph-source --save graph

      - name: Move generated graph
        run: |
          set -e
          mv graph/graph.obj graph/

      - name: Upload graph artifact
        uses: actions/upload-artifact@v4
        with:
          name: otp-graph
          path: graph
          retention-days: 30

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 89.167.73.244 >> ~/.ssh/known_hosts

      - name: Upload graph to VPS
        run: |
          ssh root@89.167.73.244 "mkdir -p /opt/bizkaifest/graph"
          scp graph/graph.obj root@89.167.73.244:/opt/bizkaifest/graph/graph.obj

      - name: Restart OTP server
        run: |
          ssh root@89.167.73.244 "systemctl restart otp"
